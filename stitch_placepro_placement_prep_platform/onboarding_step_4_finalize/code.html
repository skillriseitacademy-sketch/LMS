<header class="w-full bg-surface-container-lowest sticky top-0 z-50 shadow-sm border-b border-outline-variant flex justify-between items-center px-lg py-md max-w-container-max mx-auto">
<div class="flex items-center gap-sm">

</div>
<div class="text-label-sm font-label-sm text-on-surface-variant uppercase tracking-widest">
            Setup - Step 4 of 4
        </div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center p-md md:p-xl w-full max-w-4xl mx-auto">
<!-- Progress Indicator -->
<div class="w-full max-w-xl mb-xl">
<div class="flex justify-between mb-sm px-2">
<span class="font-label-sm text-label-sm text-on-surface-variant">Basic Info</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Education</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Interests</span>
<span class="font-label-sm text-label-sm text-primary font-bold">Visibility</span>
</div>
<div class="h-2 w-full bg-surface-variant rounded-full flex overflow-hidden">
<div class="h-full bg-primary w-full rounded-full transition-all duration-500 ease-out"></div>
</div>
</div>
<!-- Header Section -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-sm">Choose Your Profile Visibility</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mx-auto">

            </p>
</div>
<!-- Choice Cards Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg w-full mb-xl">
<!-- Public Profile Card -->
<label class="cursor-pointer group relative">
<input checked="" class="peer sr-only" name="visibility" type="radio" value="public"/>
<div class="glass-panel rounded-xl p-lg md:p-xl h-full flex flex-col items-center text-center transition-all duration-300 border-2 border-transparent peer-checked:card-selected hover:shadow-md hover:-translate-y-1">
<!-- Selected Checkmark -->
<div class="absolute top-md right-md h-6 w-6 rounded-full border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-white text-sm opacity-0 peer-checked:opacity-100" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<!-- Illustration Placeholder -->
<div class="w-32 h-32 mb-lg rounded-full bg-surface-container flex items-center justify-center overflow-hidden border border-outline-variant/30">

</div>

<div class="bg-secondary-container/20 text-secondary px-sm py-xs rounded-full font-label-sm text-label-sm mb-md inline-block">Recommended</div>
<p class="font-body-md text-body-md text-on-surface-variant">
                        Allow recruiters, peers, and mentors to discover your profile, view your projects, and see your leaderboard rankings. Best for maximum career opportunities.
                    </p>
</div>
</label>
<!-- Private Profile Card -->
<label class="cursor-pointer group relative">
<input class="peer sr-only" name="visibility" type="radio" value="private"/>
<div class="glass-panel rounded-xl p-lg md:p-xl h-full flex flex-col items-center text-center transition-all duration-300 border-2 border-transparent peer-checked:card-selected hover:shadow-md hover:-translate-y-1">

<div class="bg-surface-variant text-on-surface-variant px-sm py-xs rounded-full font-label-sm text-label-sm mb-md inline-block">Restricted</div>
<p class="font-body-md text-body-md text-on-surface-variant">
