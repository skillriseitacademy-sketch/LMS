<script>
        function toggleCard(btn) {
            const isPressed = btn.getAttribute('aria-pressed') === 'true';
            const iconContainer = btn.querySelector('.absolute.top-sm');
            const bgIcon = btn.querySelector('.w-12.h-12');
            
            if (isPressed) {
                // Deselect
                btn.setAttribute('aria-pressed', 'false');
                btn.classList.remove('border-primary');
                btn.classList.add('border-transparent');
                
                // Update top right icon
                iconContainer.innerHTML = '<span class="material-symbols-outlined">add_circle</span>';
                iconContainer.className = 'absolute top-sm right-sm text-outline opacity-0 group-hover:opacity-50 transition-opacity';
                
                // Reset main icon background
                bgIcon.className = 'w-12 h-12 rounded-xl bg-surface-container-high text-on-surface-variant flex items-center justify-center mb-md group-hover:bg-primary-fixed-dim transition-colors group-hover:text-primary';
                
                // Reset main icon fill
                const mainIcon = bgIcon.querySelector('.material-symbols-outlined');
                mainIcon.style.fontVariationSettings = "'FILL' 0";

            } else {
                // Select
                btn.setAttribute('aria-pressed', 'true');
                btn.classList.add('border-primary');
                btn.classList.remove('border-transparent', 'hover:border-outline-variant');
                
                // Update top right icon
                iconContainer.innerHTML = '<span class="material-symbols-outlined" style="font-variation-settings: \'FILL\' 1;">check_circle</span>';
                iconContainer.className = 'absolute top-sm right-sm text-primary opacity-100 transition-opacity';
                
                // Update main icon background
                bgIcon.className = 'w-12 h-12 rounded-xl bg-primary-container text-primary flex items-center justify-center mb-md group-hover:scale-110 transition-transform';
                
                // Update main icon fill
                const mainIcon = bgIcon.querySelector('.material-symbols-outlined');
                mainIcon.style.fontVariationSettings = "'FILL' 1";
            }
        }
    </script>
