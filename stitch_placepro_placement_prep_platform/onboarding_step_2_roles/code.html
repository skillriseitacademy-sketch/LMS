<!-- Footer: Suppressed based on rules for transactional screens -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const chips = document.querySelectorAll('.role-chip');
            const searchInput = document.getElementById('role-search');
            
            // Toggle chip selection
            chips.forEach(chip => {
                chip.addEventListener('click', () => {
                    chip.classList.toggle('selected');
                    // In a real app, this would update the selected state array
                });
            });

            // Simple search filter visual feedback (just highlights matching chips for demo)
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                chips.forEach(chip => {
                    const role = chip.getAttribute('data-role').toLowerCase();
                    if(term && role.includes(term)) {
                         chip.style.transform = 'scale(1.05)';
                         chip.style.boxShadow = '0 4px 6px -1px rgb(53 37 205 / 0.2)'; // Indigo shadow
                    } else {
                         chip.style.transform = 'scale(1)';
                         chip.style.boxShadow = '';
                    }
                });
            });
        });
    </script>
