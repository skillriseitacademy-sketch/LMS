<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col items-center justify-center p-md md:p-xl selection:bg-primary-container selection:text-on-primary-container">

<!-- Background Decoration -->

<div class="h-full bg-primary w-[75%] transition-all duration-500 ease-in-out"></div>
</div>
<div class="absolute -top-32 -right-32 w-64 h-64 bg-primary-fixed opacity-30 rounded-full blur-3xl pointer-events-none"></div>
<!-- Progress Header -->
<header class="flex flex-col gap-sm relative z-10">
<div class="flex items-center gap-xs text-on-surface-variant font-label-sm text-label-sm">
<span>STEP 1</span>
<span class="material-symbols-outlined text-[16px]">chevron_right</span>
<span>STEP 2</span>
<span class="material-symbols-outlined text-[16px]">chevron_right</span>
<span class="text-primary font-bold">STEP 3</span>
</div>
<div class="flex items-center justify-between mt-sm">
<div>
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface">Claim your unique handle</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">This will be your public identity on PlacePro.</p>
</div>
<div class="hidden sm:flex h-12 w-12 bg-primary-container rounded-full items-center justify-center text-on-primary-container shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">badge</span>
</div>
</div>
</header>
<!-- Main Interaction Area -->
<section class="flex flex-col gap-lg relative z-10 py-md">
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="font-headline-md text-headline-md text-outline">@</span>
</div>
<input class="w-full bg-surface-container-low border border-outline-variant text-on-surface font-headline-md text-headline-md rounded-lg py-md pl-12 pr-12 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200 placeholder-outline" id="username-input" placeholder="your_handle" type="text" value="alex_dev"/>
<div class="absolute inset-y-0 right-0 pr-md flex items-center pointer-events-none">
<div class="h-6 w-6 rounded-full bg-[#10B981]/20 flex items-center justify-center text-[#10B981] transition-transform scale-100" id="availability-icon">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
</div>
<div class="flex items-center gap-sm text-[#10B981] bg-[#10B981]/10 px-md py-sm rounded-lg animate-fade-in-up" id="status-message">
<span class="material-symbols-outlined text-[20px]">verified</span>
<span class="font-body-md text-body-md font-medium">Awesome! <strong class="font-semibold">@alex_dev</strong> is available.</span>
</div>
<!-- Gamified element -->
<div class="flex items-center gap-md bg-secondary-container/20 p-md rounded-lg border border-secondary-container/30">
<span class="material-symbols-outlined text-secondary text-[24px]">workspace_premium</span>
<p class="font-body-sm text-sm text-on-surface-variant leading-tight">
                    Securing your username early locks in your identity for the global Leaderboard.
                </p>
</div>
</section>
<!-- Actions -->
<footer class="flex items-center justify-between border-t border-outline-variant pt-lg mt-auto relative z-10">
<button class="flex items-center gap-xs px-md py-sm rounded-lg text-on-surface-variant hover:bg-surface-variant transition-colors font-body-md text-body-md font-medium">
<span class="material-symbols-outlined text-[20px]">arrow_back</span>
                Back
            </button>
<button class="flex items-center gap-xs px-lg py-sm rounded-lg bg-primary text-on-primary hover:bg-primary-fixed-variant transition-all duration-200 hover:scale-[1.02] active:scale-95 shadow-sm font-body-md text-body-md font-medium">
                Continue
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</footer>
</main>
<style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
    </style>
<script>
        // Simple interaction script to demonstrate live validation feel
        const input = document.getElementById('username-input');
        const statusMsg = document.getElementById('status-message');
        const iconContainer = document.getElementById('availability-icon');
        
        let timeout = null;

        input.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            
            // Simulating loading state
            statusMsg.style.opacity = '0';
            iconContainer.className = 'h-6 w-6 rounded-full bg-outline-variant/30 flex items-center justify-center text-outline animate-pulse';
            iconContainer.innerHTML = '<span class="material-symbols-outlined text-[16px]">sync</span>';

            clearTimeout(timeout);
            
            if(val === '') {
                 statusMsg.innerHTML = '<span class="material-symbols-outlined text-[20px]">info</span><span class="font-body-md text-body-md font-medium">Username cannot be empty.</span>';
                 statusMsg.className = 'flex items-center gap-sm text-outline bg-surface-variant px-md py-sm rounded-lg opacity-100 transition-opacity';
                 iconContainer.className = 'hidden';
                 return;
            }

            timeout = setTimeout(() => {
                if(val.length < 3) {
                    statusMsg.innerHTML = '<span class="material-symbols-outlined text-[20px]">error</span><span class="font-body-md text-body-md font-medium">Username is too short.</span>';
                    statusMsg.className = 'flex items-center gap-sm text-error bg-error-container/50 px-md py-sm rounded-lg opacity-100 transition-opacity';
                    iconContainer.className = 'h-6 w-6 rounded-full bg-error-container flex items-center justify-center text-error';
                    iconContainer.innerHTML = '<span class="material-symbols-outlined text-[16px]">close</span>';
                } else if(val.toLowerCase() === 'admin') {
                    statusMsg.innerHTML = '<span class="material-symbols-outlined text-[20px]">block</span><span class="font-body-md text-body-md font-medium">This username is reserved.</span>';
                    statusMsg.className = 'flex items-center gap-sm text-error bg-error-container/50 px-md py-sm rounded-lg opacity-100 transition-opacity';
                    iconContainer.className = 'h-6 w-6 rounded-full bg-error-container flex items-center justify-center text-error';
                    iconContainer.innerHTML = '<span class="material-symbols-outlined text-[16px]">close</span>';
                } else {
                    statusMsg.innerHTML = `<span class="material-symbols-outlined text-[20px]">verified</span><span class="font-body-md text-body-md font-medium">Awesome! <strong class="font-semibold">@${val}</strong> is available.</span>`;
                    statusMsg.className = 'flex items-center gap-sm text-[#10B981] bg-[#10B981]/10 px-md py-sm rounded-lg opacity-100 transition-opacity';
                    iconContainer.className = 'h-6 w-6 rounded-full bg-[#10B981]/20 flex items-center justify-center text-[#10B981] scale-100 transition-transform';
                    iconContainer.innerHTML = '<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: \'FILL\' 1;">check</span>';
                }
            }, 600);
        });
    </script>
