<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up - PlacePro Career OS</title>

                    },

<style>
        body {
            background-color: #faf8ff;
            background-image: radial-gradient(circle at 10% 20%, rgba(53, 37, 205, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(53, 37, 205, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
        }
        .input-glow:focus-within {
            box-shadow: 0 0 0 2px rgba(53, 37, 205, 0.2);
        }
    </style>
</head>
<body class="h-full flex items-center justify-center font-body-md text-on-background">
<div class="w-full max-w-md mx-auto p-md md:p-lg">
<!-- Brand / Header -->
<div class="text-center mb-xl">
<h1 class="font-display-lg text-display-lg text-primary mb-sm flex items-center justify-center gap-xs">
<span class="material-symbols-outlined" style="font-size: 40px; font-variation-settings: 'FILL' 1;">school</span>
                PlacePro
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant">Your Career OS</p>
</div>
<!-- Main Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-lg border border-outline-variant/30 p-lg md:p-xl relative overflow-hidden">
<!-- Decorative Top Border -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-primary-fixed"></div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-lg text-center">Create an Account</h2>
<form action="#" class="space-y-md" method="POST">
<!-- Full Name Field -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs" for="name">Full Name</label>
<div class="relative input-glow rounded-lg transition-shadow duration-200">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">person</span>
</div>
<input autocomplete="name" class="block w-full pl-xl pr-sm py-sm bg-surface-bright border border-outline-variant rounded-lg text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 sm:text-sm sm:leading-6 transition-colors duration-200" id="name" name="name" placeholder="Jane Doe" required="" type="text"/>
</div>
</div>
<!-- Email Field -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs" for="email">Email address</label>
<div class="relative input-glow rounded-lg transition-shadow duration-200">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input autocomplete="email" class="block w-full pl-xl pr-sm py-sm bg-surface-bright border border-outline-variant rounded-lg text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 sm:text-sm sm:leading-6 transition-colors duration-200" id="email" name="email" placeholder="jane@student.edu" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs" for="password">Password</label>
<div class="relative input-glow rounded-lg transition-shadow duration-200">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input autocomplete="new-password" class="block w-full pl-xl pr-sm py-sm bg-surface-bright border border-outline-variant rounded-lg text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 sm:text-sm sm:leading-6 transition-colors duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start pt-sm">
<div class="flex items-center h-5">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary-container bg-surface-bright" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="font-body-md text-sm text-on-surface-variant" for="terms">
                            I agree to the <a class="font-medium text-primary hover:text-primary-fixed-variant underline decoration-primary-fixed-dim decoration-2 underline-offset-2 transition-colors" href="#">Terms of Service</a> and <a class="font-medium text-primary hover:text-primary-fixed-variant underline decoration-primary-fixed-dim decoration-2 underline-offset-2 transition-colors" href="#">Privacy Policy</a>
</label>
</div>
</div>
<!-- Sign Up Button -->
<div class="pt-sm">
<button class="w-full flex justify-center items-center py-sm px-md border border-transparent rounded-lg shadow-sm font-headline-md text-body-md text-on-primary bg-primary hover:bg-on-primary-fixed-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container transition-all duration-200 transform hover:scale-[1.02]" type="submit">
                        Create Account
                        <span class="material-symbols-outlined ml-2 text-[20px]">arrow_forward</span>
</button>
</div>
</form>
<!-- Divider -->
<div class="mt-lg relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center">
<span class="px-sm bg-surface-container-lowest font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Or continue with</span>
</div>
</div>
<!-- Social Login -->
<div class="mt-lg">
<button class="w-full flex justify-center items-center py-sm px-md border border-outline-variant rounded-lg shadow-sm bg-surface-container-lowest font-body-md text-body-md text-on-surface hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container transition-colors duration-200" type="button">
<svg class="h-5 w-5 mr-2" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
</div>
</div>
<!-- Footer Link -->
<p class="mt-lg text-center font-body-md text-body-md text-on-surface-variant">
            Already have an account? 
            <a class="font-headline-md text-body-md text-primary hover:text-primary-fixed-variant transition-colors" href="#">Log In</a>
</p>
</div>
</body></html>
